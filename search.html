<h1>Search</h1>

<input type="search" id="search-input" placeholder="Search blog posts…" aria-label="Search blog posts" autocomplete="off">

<div id="search-results"></div>

<script src="https://unpkg.com/lunr@2.3.9/lunr.min.js"></script>
<script>
(function() {
  var index, docs;

  fetch('{{ "/search.json" | relative_url }}')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      docs = data;
      index = lunr(function() {
        this.ref('url');
        this.field('title', { boost: 10 });
        this.field('categories', { boost: 5 });
        this.field('content');

        data.forEach(function(doc) {
          this.add(doc);
        }, this);
      });
    });

  var input = document.getElementById('search-input');
  var resultsEl = document.getElementById('search-results');

  input.addEventListener('input', function() {
    var query = input.value.trim();
    if (!query || !index) {
      resultsEl.innerHTML = '';
      return;
    }

    var results = index.search(query + '*');
    if (results.length === 0) {
      resultsEl.innerHTML = '<p>No results found.</p>';
      return;
    }

    var html = '<ul class="search-results-list">';
    results.slice(0, 20).forEach(function(result) {
      var doc = docs.find(function(d) { return d.url === result.ref; });
      if (doc) {
        html += '<li><a href="' + doc.url + '">' + doc.title + '</a>';
        html += ' <span class="post-meta">' + doc.date + '</span></li>';
      }
    });
    html += '</ul>';
    resultsEl.innerHTML = html;
  });
})();
</script>
