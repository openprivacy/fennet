---
layout: default
---

<article>
  <h2>{{ page.title }}</h2>
  <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>

  {% if page.categories %}
    <p>Categories:
    {% for cat in page.categories %}
      <a href="{{ '/blog/category/' | append: cat | append: '/' | relative_url }}">{{ cat }}</a>{% unless forloop.last %}, {% endunless %}
    {% endfor %}
    </p>
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>
</article>

<nav>
  <p><a href="{{ '/blog/' | relative_url }}">← Back to Blog</a></p>
</nav>
